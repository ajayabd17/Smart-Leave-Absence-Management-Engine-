<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Leave Management - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="style.css" rel="stylesheet">
</head>

<body>
    <!-- Login Page -->
    <div id="auth-wrapper" class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fa-solid fa-leaf logo-icon"></i>
                <h2>SmartLeave</h2>
                <p>Sign in to your account</p>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@company.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label for="role">Sign in as</label>
                    <select id="role" required>
                        <option value="employee">Employee</option>
                        <option value="manager">Manager</option>
                        <option value="hr_admin">HR Admin</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Sign In</button>
            </form>
        </div>

        <!-- NEW PASSWORD REQUIRED CARD (Hidden by default) -->
        <div class="auth-card" id="change-password-card" style="display: none;">
            <div class="auth-header">
                <i class="fa-solid fa-key logo-icon" style="color: #F59E0B;"></i>
                <h2>Change Password</h2>
                <p>Please choose a new permanent password.</p>
            </div>
            <form id="change-password-form">
                <div class="form-group">
                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" placeholder="Enter new password" required>
                    <small style="color: gray; font-size: 0.75rem; margin-top: 5px; display: block;">
                        Must be at least 8 characters, with numbers and symbols.
                    </small>
                </div>
                <!-- We store the temporary session string here invisibly -->
                <input type="hidden" id="cognito-session-token">
                <input type="hidden" id="cognito-username">
                
                <button type="submit" class="btn btn-primary" style="margin-top: 15px;">Set Password & Sign In</button>
                <button type="button" class="btn btn-outline" id="cancel-change-btn" style="width: 100%; margin-top: 10px;">Cancel</button>
            </form>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast">
        <div class="toast-content">
            <i class="fa-solid fa-circle-check"></i>
            <span class="toast-message">Success!</span>
        </div>
    </div>

    <!-- Use AWS SDK v2 which is 100% stable in all browsers without bundlers -->
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1400.0.min.js"></script>
    <script src="common.js"></script>
    <script src="login.js"></script>

</body>

</html>
